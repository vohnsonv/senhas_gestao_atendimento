name: Build Mavitec Print Agent (.exe)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'agent/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r agent/requirements.txt

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller -w -F --name "Mavitec_PrintAgent" --hidden-import "pystray._win32" --collect-all pystray agent/gui_app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mavitec_PrintAgent_Exe
        path: dist/Mavitec_PrintAgent.exe
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Mavitec Print Agent (Latest Build)
        body: |
          Executável automático gerado pelo sistema Mavitec.
          Inclui GUI e configurações de margem.
        files: dist/Mavitec_PrintAgent.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
